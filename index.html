<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗小鱼 · 灵动导航</title>
    <link rel="icon" href="https://img.icons8.com/color/48/google-photos-new.png">
    <link rel="shortcut icon" href="https://img.icons8.com/color/48/google-photos-new.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/96/google-photos-new.png">
    <!-- Font Awesome (保留用于其他装饰, 但卡片图标将使用Emoji) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f0f4fa;
            color: #1e293b;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 游动的鱼背景 (保留原有动态效果) */
        .fish-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .fish {
            position: absolute;
            animation: swim 20s linear infinite;
            will-change: transform;
            pointer-events: none;
        }
        
        .fish img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
        }
        
        .fish-small { width: 28px; height: 28px; opacity: 0.65; animation-duration: 15s; }
        .fish-medium { width: 42px; height: 42px; opacity: 0.7; animation-duration: 24s; }
        .fish-large { width: 72px; height: 72px; opacity: 0.55; animation-duration: 32s; }
        .fish-fast { animation-duration: 10s; opacity: 0.8; }
        .fish-slow { animation-duration: 45s; opacity: 0.45; }
        .fish-reverse { animation-direction: reverse; }
        .fish-special { opacity: 0.65; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25)); }
        
        @keyframes swim {
            0% { transform: translateX(-120px) rotate(0deg); }
            100% { transform: translateX(calc(100vw + 120px)) rotate(360deg); }
        }
        .fish-vertical { animation: swimVertical 28s linear infinite; }
        @keyframes swimVertical {
            0% { transform: translateY(-120px) rotate(90deg); }
            100% { transform: translateY(calc(100vh + 120px)) rotate(450deg); }
        }
        .fish-diagonal { animation: swimDiagonal 32s linear infinite; }
        @keyframes swimDiagonal {
            0% { transform: translate(-120px, -120px) rotate(45deg); }
            100% { transform: translate(calc(100vw + 120px), calc(100vh + 120px)) rotate(405deg); }
        }
        
        .click-effect {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.6;
            animation: ripple 1s ease-out forwards;
        }
        @keyframes ripple {
            0% { transform: scale(0.1); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        
        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            background-color: rgba(245, 248, 255, 0.28);
            backdrop-filter: blur(1px);
            border-radius: 28px;
            margin-top: 25px;
            margin-bottom: 25px;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        
        h1 {
            font-size: 46px;
            background: linear-gradient(145deg, #2a5c8a, #6b4fbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 5px 15px rgba(37, 117, 252, 0.15);
        }
        
        .subtitle {
            color: #1e3a5f;
            font-size: 22px;
            font-weight: 500;
            min-height: 36px;
            margin-bottom: 25px;
        }
        
        .tagline {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, #4364ad, #5f2b8c);
            color: white;
            border-radius: 40px;
            font-size: 17px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(67, 100, 173, 0.25);
            backdrop-filter: blur(4px);
        }
        /* 移除不需要的文字，但保留tagline结构，内容在JS中清空/隐藏 */
        
        .main-link {
            display: inline-block;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            color: #2a4f7c;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            margin-bottom: 45px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .main-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 30px rgba(37, 99, 235, 0.2);
            background: white;
            color: #1e4a7a;
        }
        
        .category-group {
            margin-bottom: 45px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(110, 130, 180, 0.15);
            width: 100%;
            text-align: center;
        }
        .category-group:last-child { border-bottom: none; }
        
        .category-title {
            font-size: 26px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 28px;
            display: inline-block;
            padding: 0 20px;
            position: relative;
            letter-spacing: 1px;
        }
        .category-title:before, .category-title:after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #6d8ec0, #9b6ab0);
            border-radius: 3px;
        }
        .category-title:before { left: -80px; }
        .category-title:after { right: -80px; }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }
        
        /* 卡片 —— 使用emoji大图标 */
        .nav-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 28px 18px 22px;
            text-align: center;
            text-decoration: none;
            color: #1e293b;
            box-shadow: 0 15px 30px -8px rgba(0, 20, 40, 0.12);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(210, 225, 255, 0.6);
            position: relative;
            overflow: hidden;
            height: 180px;
            min-height: 180px;
        }
        .nav-card:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #3b71ca, #a855f7);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        .nav-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 28px 40px -10px rgba(59, 113, 202, 0.3);
            background: rgba(255, 255, 255, 1);
            border-color: #bdd0f0;
        }
        .nav-card:hover:before { transform: scaleX(1); }
        
        /* 卡片图标区 —— 显示emoji */
        .card-icon {
            font-size: 58px;
            margin-bottom: 18px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #eef3ff, #ffffff);
            border-radius: 40px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            transition: transform 0.3s;
        }
        .nav-card:hover .card-icon {
            transform: scale(1.08);
        }
        
        .nav-title {
            font-size: 22px;
            font-weight: 700;
            margin-top: 4px;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }
        
        /* 隐藏描述 */
        .nav-desc { display: none; }
        
        footer {
            text-align: center;
            color: #2c3e50;
            font-size: 15px;
            padding: 30px 0 20px;
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        .footer-content {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 30px;
            border-radius: 50px;
            background: rgba(240, 246, 255, 0.35);
            backdrop-filter: blur(8px);
        }
        
        .click-text-effect {
            position: absolute;
            pointer-events: none;
            z-index: 1001;
            opacity: 0;
            font-size: 18px;
            font-weight: bold;
            color: #1e3a5f;
            text-shadow: 0 2px 6px rgba(255,255,255,0.9);
            white-space: nowrap;
            animation: textFloat 1.5s ease-out forwards;
        }
        @keyframes textFloat {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            20% { opacity: 1; transform: translate(-50%, -110%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -220%) scale(1.3); }
        }
        
        @media (max-width: 1200px) {
            .nav-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 992px) {
            .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 22px; }
            .category-title:before, .category-title:after { width: 35px; }
            .category-title:before { left: -50px; }
            .category-title:after { right: -50px; }
        }
        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: 1fr; max-width: 480px; }
            .nav-card { max-width: 480px; margin: 0 auto; height: 170px; }
            .category-title:before, .category-title:after { display: none; }
            h1 { font-size: 38px; }
        }
    </style>
</head>
<body>
    <div class="fish-background" id="fishBackground"></div>
    
    <div class="container">
        <header>
            <h1>小鱼导航</h1>
            <p class="subtitle" id="subtitle">一个链接，聚合、分享你的所有信息</p>
            <!-- tagline 已清空 (移除“随心所向 · 200+ 灵动图标”) -->
            <div class="tagline" id="tagline" style="display: none;"></div>
        </header>
        
        <!-- 常用分类 -->
        <div class="category-group">
            <h2 class="category-title"><i class="fa-regular fa-star" style="margin-right: 12px;"></i>常用</h2>
            <div class="nav-grid" id="grid-common"></div>
        </div>
        
        <!-- 影视分类 -->
        <div class="category-group">
            <h2 class="category-title"><i class="fa-solid fa-clapperboard" style="margin-right: 12px;"></i>影视</h2>
            <div class="nav-grid" id="grid-movie"></div>
        </div>

        <!-- 下载分类 -->
        <div class="category-group">
            <h2 class="category-title"><i class="fa-solid fa-download" style="margin-right: 12px;"></i>下载</h2>
            <div class="nav-grid" id="grid-download"></div>
        </div>
    </div>
    
    <footer>
        <div class="footer-content">
            <p>✨ 向海风许愿，在山海相见 ✨</p>
            <p>© 2026 罗小鱼 · 灵动导航 | Emoji 图标 · 影视聚合</p>
        </div>
    </footer>

    <script>
        (function(){
            "use strict";

            // ---------- 游动的鱼背景 (保留超过200个元素) ----------
            function initFishBackground() {
                const fishContainer = document.getElementById('fishBackground');
                const fishUrls = [
                    'https://img.icons8.com/color/96/fish.png',
                    'https://img.icons8.com/color/96/clown-fish.png',
                    'https://img.icons8.com/color/96/koi-fish.png',
                    'https://img.icons8.com/color/96/dolphin.png',
                    'https://img.icons8.com/color/96/whale.png',
                    'https://img.icons8.com/color/96/starfish.png',
                    'https://img.icons8.com/color/96/seahorse.png',
                    'https://img.icons8.com/color/96/jellyfish.png',
                    'https://img.icons8.com/color/96/turtle.png',
                    'https://img.icons8.com/color/96/crab.png',
                    'https://img.icons8.com/color/96/octopus.png'
                ];
                const fishClasses = ['fish-small','fish-medium','fish-large','fish-fast','fish-slow','fish-reverse','fish-vertical','fish-diagonal'];
                
                for (let i = 0; i < 220; i++) {
                    const fish = document.createElement('div');
                    fish.className = 'fish';
                    const img = document.createElement('img');
                    img.src = fishUrls[Math.floor(Math.random() * fishUrls.length)];
                    img.alt = 'fish';
                    img.style.filter = `hue-rotate(${Math.random()*60-30}deg) brightness(${0.9+Math.random()*0.5}) contrast(${1.0+Math.random()*0.4})`;
                    fish.appendChild(img);
                    fish.style.top = `${Math.random()*100}vh`;
                    fish.style.left = `${Math.random()*100}vw`;
                    fish.style.animationDelay = `-${Math.random()*50}s`;
                    fish.style.animationDuration = `${8 + Math.random()*45}s`;
                    const size = 20 + Math.random()*80;
                    fish.style.width = `${size}px`; fish.style.height = `${size}px`;
                    fish.style.opacity = `${0.35+Math.random()*0.55}`;
                    fish.classList.add(fishClasses[Math.floor(Math.random()*fishClasses.length)]);
                    fishContainer.appendChild(fish);
                }
                // 额外大鱼
                for (let i=0;i<18;i++) {
                    const big = document.createElement('div');
                    big.className = 'fish fish-large fish-special';
                    const img = document.createElement('img');
                    img.src = Math.random()>0.5 ? 'https://img.icons8.com/color/96/whale.png' : 'https://img.icons8.com/color/96/dolphin.png';
                    img.style.filter = `hue-rotate(${Math.random()*30}deg) brightness(1.15)`;
                    big.appendChild(img);
                    big.style.top = `${Math.random()*100}vh`; big.style.left = `${Math.random()*100}vw`;
                    big.style.animationDelay = `-${Math.random()*70}s`;
                    big.style.width='95px'; big.style.height='95px';
                    big.style.opacity='0.6';
                    big.classList.add(Math.random()>0.5?'fish-diagonal':'fish-vertical');
                    fishContainer.appendChild(big);
                }
                for (let i=0;i<30;i++) {
                    const fast = document.createElement('div');
                    fast.className = 'fish fish-small fish-fast';
                    const img = document.createElement('img');
                    img.src = 'https://img.icons8.com/color/96/clown-fish.png';
                    img.style.filter = `hue-rotate(${Math.random()*40-20}deg) brightness(1.3)`;
                    fast.appendChild(img);
                    fast.style.top = `${Math.random()*100}vh`; fast.style.left = `${Math.random()*100}vw`;
                    fast.style.width='32px'; fast.style.height='32px'; fast.style.opacity='0.8';
                    fishContainer.appendChild(fast);
                }
            }

            // ---------- 使用提供的Emoji列表 ----------
            const emojiList = [
                '😊', '😄', '😃', '😀', '😁', '😆', '😅', '🤣', '😂', '🙂',
                '🙃', '😉', '😌', '😍', '🥰', '😘', '😗', '😙', '😚', '🤗',
                '🤔', '🤨', '😐', '😑', '😶', '🙄', '😏', '😣', '😥', '😮',
                '👍',  '👊', '✊', '🤛', '🤜', '🤚', '👋', '🤟', '🤘',
                '👌', '🤌', '🤏', '✌️', '🤞', '🎮', '📱', '💻', '🖥️', '⌨️',
                '🖱️', '🖨️', '📀', '💾', '☁️', '🌐', '📡', '📺', '📻', '🎙️',
                '🎬', '🎭', '🎪', '🎨', '🎯', '🎲', '🎸', '🎹', '🎺', '🎻',
                '📚', '📖', '📝', '✏️', '🔖', '🚀', '🛸', '✨', '⭐', '🌟',
                '🍎', '🍕', '🍔', '🍟', '🌮', '🍦', '🍩', '🍪', '☕', '🍷',
                '🐶', '🐱', '🦊', '🐼', '🐨', '🐸', '🐧', '🦄', '🐝', '🐞',
                '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '💕', '💖',
                '👾', '🤖', '👽', '💀', '👻', '🎃', '😈', '👹', '👺', '🤡',
                '⚽', '🏀', '🏈', '⚾', '🎾', '🏐', '🏓', '🏸', '🥊', '🏆',
                '🔔', '🎵', '🎶', '📢', '📣', '💬', '💭', '🔧', '🔨', '⚒️',
                '🌲', '🌳', '🌴', '🌵', '🌾', '🌿', '☘️', '🍀', '🌸', '🌼',
                '🏠', '🏡', '🏢', '🏣', '🏥', '🏦', '🏨', '⛪', '🕌', '🗽'
            ];
            
            function getRandomEmoji() {
                return emojiList[Math.floor(Math.random() * emojiList.length)];
            }

            // 卡片数据 (无desc)
            const commonLinks = [
                { title: '博客', url: 'https://sshd.mysxl.cn/' },
                { title: '维沃云服务', url: 'https://yun.vivo.com.cn/' },
                { title: '荣耀云服务', url: 'https://cloud.hihonor.com/' },
                { title: '小鱼开源', url: 'https://gitee.com/sshd/xiaoyu' }
            ];
            const movieLinks = [
                { title: '影视宝藏', url: 'https://tv.baozangdh.com/' },
                { title: '可乐影视', url: 'https://www.klyingshi.top/' },
                { title: '硬核影视', url: 'https://yinghezhinan.com/' },
                { title: '发现之门', url: 'https://faxianx.com/' },
                { title: 'kimivod', url: 'https://kimivod.com/' },
                { title: '极光影视', url: 'https://hellociqryx6e.com/' },
                { title: '在线之家', url: 'https://www.zxzjys.com/' },
                { title: '注视影视', url: 'https://gaze.run/' }
            ];
            const downloadLinks = [
                { title: '变身影视', url: 'https://yinghezhinan.com/ios-app/' },
                { title: '电影港网', url: 'https://www.dyg55.com/' },
                { title: '美剧粉', url: 'https://www.mjf2020.com/' },
                { title: '高清族', url: 'https://www.hdzu.cc/' }
            ];

            function renderCards(containerId, items) {
                const grid = document.getElementById(containerId);
                if (!grid) return;
                grid.innerHTML = '';
                items.forEach(item => {
                    const a = document.createElement('a');
                    a.className = 'nav-card';
                    a.href = item.url;
                    a.target = '_blank';
                    
                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'card-icon';
                    // 使用Emoji代替FontAwesome图标
                    iconDiv.textContent = getRandomEmoji();
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'nav-title';
                    titleDiv.textContent = item.title;
                    
                    a.appendChild(iconDiv);
                    a.appendChild(titleDiv);
                    grid.appendChild(a);
                });
            }

            // 页面加载
            window.addEventListener('load', function() {
                initFishBackground();
                
                renderCards('grid-common', commonLinks);
                renderCards('grid-movie', movieLinks);
                renderCards('grid-download', downloadLinks);
                
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.6s';
                setTimeout(() => document.body.style.opacity = '1', 80);
                
                const allCards = document.querySelectorAll('.nav-card');
                allCards.forEach((card, idx) => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(15px)';
                    setTimeout(() => {
                        card.style.transition = 'opacity 0.5s, transform 0.5s';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, 100 + idx * 30);
                });
                
                const footer = document.querySelector('.footer-content');
                if(footer) {
                    footer.style.opacity = '0';
                    setTimeout(() => { footer.style.transition = 'opacity 0.8s'; footer.style.opacity = '1'; }, 400);
                }
            });

            // 点击特效 (保留)
            document.addEventListener('click', function(e) {
                const effect = document.createElement('div');
                effect.className = 'click-effect';
                const colors = ['#3b71ca','#a855f7','#0ea5e9','#f97316','#8b5cf6'];
                effect.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                effect.style.left = e.clientX + 'px';
                effect.style.top = e.clientY + 'px';
                document.body.appendChild(effect);
                setTimeout(() => effect.remove(), 1000);
                
                const textEffect = document.createElement('div');
                textEffect.className = 'click-text-effect';
                const texts = ['🐟 自由','🐠 灵动','🐡 探索','🌊 深蓝','✨ 闪耀','⚡ 极速','💧 清澈','🌀 旋转'];
                textEffect.textContent = texts[Math.floor(Math.random()*texts.length)];
                textEffect.style.left = e.clientX + 'px';
                textEffect.style.top = e.clientY + 'px';
                document.body.appendChild(textEffect);
                setTimeout(() => textEffect.remove(), 1400);
            });

            // 动态问候
            const greetings = ["欢迎来到小鱼导航", "Emoji 图标随心配", "影视聚合·下载无忧", "一个链接，无限可能", "小鱼 · 灵动空间"];
            let idx = 0;
            const subtitle = document.getElementById('subtitle');
            if(subtitle) {
                subtitle.textContent = greetings[0];
                setInterval(() => {
                    idx = (idx + 1) % greetings.length;
                    subtitle.textContent = greetings[idx];
                }, 4500);
            }
            
            // 隐藏tagline (移除指定文字)
            const taglineEl = document.getElementById('tagline');
            if(taglineEl) taglineEl.style.display = 'none';
        })();
    </script>
</body>
</html>
